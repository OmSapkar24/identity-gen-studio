version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: identity_backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: identity_frontend
    working_dir: /app
    command: sh -c 'npm install && npm run dev'
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model_cache:
